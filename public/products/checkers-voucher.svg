<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>

    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <ellipse cx="600" cy="615" rx="270" ry="34" fill="#0f172a" opacity="0.06"/>

  <!-- ticket/voucher -->
  <g filter="url(#softShadow)">
    <path d="M360 280h480c28 0 50 22 50 50v170c-28 0-50 22-50 50H360c0-28-22-50-50-50V330c28 0 50-22 50-50z"
          fill="#ffffff" stroke="url(#ink)" stroke-width="20" stroke-linejoin="round"/>
    <path d="M420 345h360" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>
    <path d="M420 410h240" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>
    <path d="M420 475h300" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>

    <rect x="730" y="395" width="120" height="110" rx="26" fill="url(#accent)"/>
    <path d="M775 455l18 18 38-42" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
