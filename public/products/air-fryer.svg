<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>

    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <ellipse cx="600" cy="625" rx="270" ry="34" fill="#0f172a" opacity="0.06"/>

  <g filter="url(#softShadow)">
    <!-- body -->
    <rect x="420" y="210" width="360" height="430" rx="90" fill="#ffffff" stroke="url(#ink)" stroke-width="22"/>
    <!-- top -->
    <path d="M470 250c30-45 80-70 130-70h0c50 0 100 25 130 70"
          fill="none" stroke="url(#ink)" stroke-width="22" stroke-linecap="round"/>
    <!-- window -->
    <rect x="480" y="320" width="240" height="170" rx="50" fill="#0f172a" opacity="0.06" stroke="#cbd5e1" stroke-width="12"/>
    <!-- knob -->
    <circle cx="600" cy="535" r="34" fill="url(#accent)"/>
    <!-- handle -->
    <path d="M520 585h160" stroke="url(#ink)" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
